name: Next CI/CD

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  lint:
    name: Lint

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

  build:
    name: Build

    runs-on: ubuntu-latest

    needs: lint

    services:
      postgres:
        image: postgres:16

        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: caresphere_db

        ports:
          - 5433:5432

        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5433/caresphere_db

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Database Migrations
        run: npx prisma migrate deploy

      - name: Build Application
        run: npm run build

  docker:
    name: Docker Build

    runs-on: ubuntu-latest

    needs: build

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: docker build -t caresphere:latest .

      - name: Verify Docker Image
        run: docker image inspect caresphere:latest

  deploy:
    name: Deploy

    runs-on: ubuntu-latest

    needs: docker

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deployment Placeholder
        run: echo "Deployment will be configured when infrastructure is available."